name: KoalaFFA
version: 1.0.0
main: com.ffa.FFAPlugin
api-version: '1.21'
softdepend: [PlaceholderAPI]
description: KoalaFFA - FFA Kit plugin with tier system
authors: [KoalaFFA]

commands:
  spawnnpc:
    description: Spawn the Kit NPC
    usage: /spawnnpc
    permission: ffa.admin
  removenpc:
    description: Remove the Kit NPC
    usage: /removenpc
    permission: ffa.admin
  tier:
    description: Check your current tier
    usage: /tier
  settier:
    description: Set a player's tier
    usage: /settier <player> <tier>
    permission: ffa.admin
  resetplayer:
    description: Reset a player to tier 1
    usage: /resetplayer <player>
    permission: ffa.admin
  msg:
    description: Send a private message
    usage: /msg <player> <message>
  tell:
    description: Send a private message
    usage: /tell <player> <message>
  reply:
    description: Reply to last message
    usage: /reply <message>
  r:
    description: Reply to last message
    usage: /r <message>
  koalaffa:
    description: Reload KoalaFFA
    usage: /koalaffa reload
    permission: ffa.admin
  stats:
    description: View player stats
    usage: /stats [player]
  setspawn:
    description: Set the FFA spawn
    usage: /setspawn
    permission: ffa.admin
  spawn:
    description: Teleport to spawn
    usage: /spawn
  setarena1:
    description: Set arena corner 1
    usage: /setarena1
    permission: ffa.admin
  setarena2:
    description: Set arena corner 2
    usage: /setarena2
    permission: ffa.admin
  spawnarnanpc:
    description: Spawn the arena RTP NPC
    usage: /spawnarnanpc
    permission: ffa.admin
  removearnanpc:
    description: Remove the arena RTP NPC
    usage: /removearnanpc
    permission: ffa.admin
  savearena:
    description: Saves the arena
    usage: /savearena
  resetarena:
    description: Resets the arena
    usage: /resetarena

permissions:
  ffa.admin:
    description: Admin access
    default: op
  savearena:
    description: Save the arena schematic for auto-reset
    usage: /savearena
    permission: ffa.admin
  resetarena:
    description: Manually reset the arena now
    usage: /resetarena
    permission: ffa.admin
