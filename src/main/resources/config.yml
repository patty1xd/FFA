    - 5
    - 10
    - 15
    - 20
    - 25
  message: "&6⚡ &e{player} &6is on a &c{streak} kill streak&6!"

# Spawn settings
spawn:
  wait-time: 5
  wait-message: "&eTeleporting to spawn in &f{time}s&e. Don't move!"
  cancelled-message: "&cTeleport cancelled!"
  teleported-message: "&aTeleported to spawn!"
  in-combat-message: "&cYou cannot use /spawn while in combat!"

# Death consequences per tier matchup
# victim-tier -> killer-tier -> action
# Actions:
#   "lose-tier"        — drop one tier (default behavior)
#   "lose-progress"    — reset kill progress but keep tier
#   "nothing"          — no penalty at all
# Example: tier 1 dying to tier 5 loses a tier
# Example: tier 3 dying to tier 1 only loses progress (no tier drop)
death-consequences:
  1:
    1: "lose-tier"
    2: "lose-tier"
    3: "lose-tier"
    4: "lose-tier"
    5: "lose-tier"
    6: "lose-tier"
  2:
    1: "lose-tier"
    2: "lose-tier"
    3: "lose-tier"
    4: "lose-tier"
    5: "lose-tier"
    6: "lose-tier"
  3:
    1: "lose-progress"
    2: "lose-tier"
    3: "lose-tier"
    4: "lose-tier"
    5: "lose-tier"
    6: "lose-tier"
  4:
    1: "lose-progress"
    2: "lose-progress"
    3: "lose-tier"
    4: "lose-tier"
    5: "lose-tier"
    6: "lose-tier"
  5:
    1: "nothing"
    2: "lose-progress"
    3: "lose-progress"
    4: "lose-tier"
    5: "lose-tier"
    6: "lose-tier"
  6:
    1: "nothing"
    2: "nothing"
    3: "lose-progress"
    4: "lose-progress"
    5: "lose-tier"
    6: "lose-tier"

# Arena auto-reset settings
arena-reset:
  enabled: true
  interval-minutes: 15
  warning-seconds:
    - 60
    - 30
    - 10
    - 5
  warning-message: "&c⚠ Arena resetting in &f{time}&c!"
  reset-message: "&c⚠ Arena is resetting!"
  done-message: "&aArena has been reset!"

# Arena item/arrow cleanup
arena-cleanup:
  enabled: true
  interval-seconds: 60
  message: "&7Arena items cleared."

  # RANKS NPC settings
rank-npc:
  # The URL players are sent when they right-click the RANKS witch NPC
  store-url: "https://your-store.tebex.io"

